<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  .header-wrap { text-align: center; padding: 2rem 0 1.5rem; font-family: 'DM Sans', sans-serif; }
  .reindeer-row { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 1.25rem; height: 50px; }

  .r-animal {
    --flip: -1;
    
    transform: translateY(0) scaleX(var(--flip));
    transform-origin: center;

    animation: bob 3s ease-in-out infinite;
    animation-fill-mode: both;;

  }

  .sled {
    margin-bottom: -10px;
  }

  .rein1 { animation-delay: 0.0s; }
  .rein2 { animation-delay: 0.3s; }
  .rein3 { animation-delay: 0.6s; }
  .rein4 { animation-delay: 0.9s; }
  .sled  { animation-delay: 1.2s; }

  @keyframes bob {
    0%, 100% { transform: translateY(0)   scaleX(var(--flip)); }
    50%      { transform: translateY(-6px) scaleX(var(--flip)); }
  }

  .cal-title { font-family: 'Museo Sans', sans-serif; font-size: 32px; font-weight: 300; letter-spacing: -0.02em; color: #3a6b4a; margin: 0 0 6px; }
  .cal-subtitle { font-size: 11px; color: #7aaa88; letter-spacing: 0.14em; text-transform: uppercase; margin: 0; }
</style>


  <style>
    /* ============================================================
       FARGER PÅ LUKENE
       Hver oppføring er [bakgrunnsfarge, tekstfarge].
       Rekkefølgen gjentas for alle 24 luker (luke 1 = indeks 0, osv.)
       Du kan endre hex-verdiene fritt, eller legge til/fjerne rader.
    ============================================================ */
    :root {
      --door-colors: none; /* se DOOR_COLORS i JavaScript-seksjonen under */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Museo Sans', sans-serif;
      font-weight: 100;
      background: #f2f2f9;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .cal-root { width: 100%; max-width: 720px; }

    /* ── Topp-seksjon ── */
    .cal-header { text-align: center; margin-bottom: 2.5rem; }

    .snow-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.25rem; opacity: 0.5; }
    .snow-dot { width: 5px; height: 5px; border-radius: 50%; background: #a8d5b5; animation: float 3s ease-in-out infinite; }
    .snow-dot:nth-child(2){animation-delay:.5s} .snow-dot:nth-child(3){animation-delay:1s}
    .snow-dot:nth-child(4){animation-delay:1.5s} .snow-dot:nth-child(5){animation-delay:2s}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

    /* ============================================================
       OVERSKRIFT OG UNDERTITTEL
       Endre tekst i HTML-elementene lengre nede i <body>.
       Endre utseende her:
    ============================================================ */
    .cal-title {
      font-family: 'Museo Sans', sans-serif;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #5a8a6a;
      margin-bottom: 6px;
    }
    .cal-subtitle {
      font-size: 12px;
      color: #6aab82;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .cal-footer {
      text-align: center;
      margin-top: 20px;
      color: #2a4030;
    }

    /* ── Rutenett ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    @media (max-width: 500px) {
      .cal-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    }

    /* ── Luke (dør) ── */
    .door { aspect-ratio: 1; position: relative; cursor: pointer; border-radius: 10px; overflow: hidden; }
    .door.locked { cursor: not-allowed; }

    .door-scene { position: absolute; inset: 0; border-radius: 10px; overflow: hidden; }

    .door-back {
      position: absolute; inset: 0;
      background: #111d16;
      border: 0.5px solid #2a4030;
      border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px; text-align: center; z-index: 1;
    }
    .door-content-day { font-size: 9px; letter-spacing: 0.07em; color: #5a8a6a; margin-bottom: 4px; text-transform: uppercase; }
    .door-content-text { font-size: 10px; color: #8ac8a0; line-height: 1.35; }

    .door-left, .door-right {
      position: absolute; top: 0; bottom: 0; width: 50%; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      border: 0.5px solid rgba(0,0,0,0.12);
      transition: transform 0.65s cubic-bezier(0.4,0,0.2,1);
      backface-visibility: hidden; overflow: hidden;
    }
    .door-left  { left: 0;  border-radius: 10px 0 0 10px; transform-origin: left center; }
    .door-right { right: 0; border-radius: 0 10px 10px 0; transform-origin: right center; }
    .door.open .door-left  { transform: perspective(500px) rotateY(-115deg); }
    .door.open .door-right { transform: perspective(500px) rotateY(115deg); }
    .door.locked .door-left, .door.locked .door-right { opacity: 0.45; }

    .door-num-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .door-num {
      font-family: 'Museo Sans', sans-serif;
      font-size: clamp(20px, 3.5vw, 30px);
      font-weight: 300;
      line-height: 1;
      white-space: nowrap;
      position: absolute;
    }

    .divider {
      position: absolute; top: 0; bottom: 0; left: 50%;
      width: 1px; background: rgba(0,0,0,0.15); z-index: 3;
      pointer-events: none; transition: opacity 0.4s;
    }
    .door.open .divider { opacity: 0; }

    /* ── Modal ── */

    .modal-text a {
    color: #a8d5b5;
    text-decoration: underline;
    }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: #111d16;
      border: 0.5px solid #2a4030;
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px; width: 92%;
      position: relative;
      animation: modal-in .32s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes modal-in{from{opacity:0;transform:scale(0.85) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}

    .modal-day { font-size: 12px; font-weight: 300; letter-spacing: .12em; text-transform: uppercase; color: #5a8a6a; margin-bottom: .4rem; }
    .modal-title { font-family: 'Museo Sans', sans-serif; font-size: 24px; font-weight: 300; margin: 0 0 1rem; color: #e8f5ee; line-height: 1.2; }
    .modal-media { width: 100%; border-radius: 8px; margin-bottom: 1rem; display: block; }
    .modal-video { width: 100%; border-radius: 8px; margin-bottom: 1rem; display: block; background: #000; }
    .modal-text { font-size: 14px; line-height: 1.8; color: #8ac8a0; }

    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 30px; height: 30px;
      border: 0.5px solid #2a4030; border-radius: 50%;
      background: #1a2e20; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #6aab82; line-height: 1;
    }
    .modal-close:hover { background: #223828; }
  </style>
</head>

      12: { title: "Luke 12", text: "Fyll inn innhold her.", img: null, video: null },
      13: { title: "Luke 13", text: "Fyll inn innhold her.", img: null, video: null },
      14: { title: "Luke 14", text: "Fyll inn innhold her.", img: null, video: null },
      15: { title: "Luke 15", text: "Fyll inn innhold her.", img: null, video: null },
      16: { title: "Luke 16", text: "Fyll inn innhold her.", img: null, video: null },
      17: { title: "Luke 17", text: "Fyll inn innhold her.", img: null, video: null },
      18: { title: "Luke 18", text: "Fyll inn innhold her.", img: null, video: null },
      19: { title: "Luke 19", text: "Fyll inn innhold her.", img: null, video: null },
      20: { title: "Luke 20", text: "Fyll inn innhold her.", img: null, video: null },
      21: { title: "Luke 21", text: "Fyll inn innhold her.", img: null, video: null },
      22: { title: "Luke 22", text: "Fyll inn innhold her.", img: null, video: null },
      23: { title: "Luke 23", text: "Fyll inn innhold her.", img: null, video: null },
      24: { title: "God jul!", text: "Gledesriktig jul til deg og dine. 🎄", img: null, video: null },
    };


    /* ============================================================
       KALENDER-LOGIKK — ikke nødvendig å endre noe herfra og ned
    ============================================================ */
    const grid    = document.getElementById('grid');
    const overlay = document.getElementById('overlay');

    for (let d = 1; d <= 24; d++) {
      const [bg, textCol] = DOOR_COLORS[(d - 1) % DOOR_COLORS.length];
      const isSingle = d < 10;
      const label    = String(d);

      const door  = document.createElement('div');
      const state = d < TODAY ? ' open' : d === TODAY ? ' today' : ' locked';
      door.className = 'door' + state;

      const scene = document.createElement('div');
      scene.className = 'door-scene';

      const back = document.createElement('div');
      back.className = 'door-back';
      if (d <= TODAY) {
        const c = CONTENT[d];
        back.innerHTML = `<p class="door-content-day">Des ${d}</p><p class="door-content-text">${c ? c.title : '...'}</p>`;
      }

      const divider = document.createElement('div');
      divider.className = 'divider';

      const leftHalf  = document.createElement('div');
      leftHalf.className  = 'door-left';
      leftHalf.style.background  = bg;

      const rightHalf = document.createElement('div');
      rightHalf.className = 'door-right';
      rightHalf.style.background = bg;

      if (isSingle) {
        // enkeltsiffer: tallet strekker seg over begge halvdeler
        const makeWrap = (side) => {
          const w = document.createElement('div');
          w.className = 'door-num-wrap';
          const n = document.createElement('div');
          n.className = 'door-num';
          n.style.color = textCol;
          n.textContent = label;
          if (side === 'left')  { n.style.right = '0'; n.style.transform = 'translateX(50%)'; }
          else                  { n.style.left  = '0'; n.style.transform = 'translateX(-50%)'; }
          w.appendChild(n);
          return w;
        };
        leftHalf.appendChild(makeWrap('left'));
        rightHalf.appendChild(makeWrap('right'));
      } else {
        // tositret: første siffer til venstre, andre til høyre
        const makeDigit = (ch, side) => {
          const w = document.createElement('div');
          w.className = 'door-num-wrap';
          const n = document.createElement('div');
          n.className = 'door-num';
          n.style.color = textCol;
          n.textContent = ch;
          n.style[side === 'left' ? 'right' : 'left'] = '4px';
          w.appendChild(n);
          return w;
        };
        leftHalf.appendChild(makeDigit(label[0], 'left'));
        rightHalf.appendChild(makeDigit(label[1], 'right'));
      }

      scene.appendChild(back);
      scene.appendChild(leftHalf);
      scene.appendChild(rightHalf);
      scene.appendChild(divider);
      door.appendChild(scene);

      if (d <= TODAY) {
        door.addEventListener('click', () => openDoor(d, door));
      }

      grid.appendChild(door);
    }

    function openDoor(d, doorEl) {
      const c = CONTENT[d] || { title: `Luke ${d}`, text: 'Innhold kommer snart.', img: null, video: null };
      document.getElementById('modal-day').textContent   = `${d}. desember`;
      document.getElementById('modal-title').textContent = c.title;
      if (c.html) {
         document.getElementById('modal-text').innerHTML = c.html;
        } else {
        document.getElementById('modal-text').textContent = c.text;
        }

      const img = document.getElementById('modal-img');
      if (c.img) { img.src = c.img; img.style.display = 'block'; }
      else       { img.style.display = 'none'; }

      const video = document.getElementById('modal-video');
      const vs    = document.getElementById('modal-video-src');
      if (c.video) { vs.src = c.video; video.load(); video.style.display = 'block'; }
      else         { video.style.display = 'none'; video.pause(); }

      overlay.classList.add('visible');
      doorEl.classList.add('open');
    }

    function closeModal() {
      overlay.classList.remove('visible');
      document.getElementById('modal-video').pause();
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  </script>
</body>
</html>
