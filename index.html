  <style>
  @font-face { font-family: 'Museo Sans'; src: url('font/Museo Sans 100.otf') format('opentype'); font-weight: 100; }
  @font-face { font-family: 'Museo Sans'; src: url('font/Museo Sans 300.otf') format('opentype'); font-weight: 300; }
  @font-face { font-family: 'Museo Sans'; src: url('font/Museo Sans 500.otf') format('opentype'); font-weight: 500; }
  @font-face { font-family: 'Museo Sans'; src: url('font/Museo Sans 700.otf') format('opentype'); font-weight: 700; }
  @font-face { font-family: 'Museo Sans'; src: url('font/Museo Sans 900.otf') format('opentype'); font-weight: 900; }
  </style>
  <style>
    .header-wrap { text-align: center; padding: 2rem 0 1.5rem; font-family: 'DM Sans', sans-serif; }
    .reindeer-row { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 1.25rem; height: 50px; }
    .r-animal { --flip: -1; transform: translateY(0) scaleX(var(--flip)); transform-origin: center; animation: bob 3s ease-in-out infinite; animation-fill-mode: both; }
    .sled { margin-bottom: -10px; }
    .rein1 { animation-delay: 0.0s; } .rein2 { animation-delay: 0.3s; }
    .rein3 { animation-delay: 0.6s; } .rein4 { animation-delay: 0.9s; }
    .sled  { animation-delay: 1.2s; }
    @keyframes bob { 0%, 100% { transform: translateY(0) scaleX(var(--flip)); } 50% { transform: translateY(-6px) scaleX(var(--flip)); } }
    .cal-title { font-family: 'Museo Sans', sans-serif; font-size: 32px; font-weight: 300; letter-spacing: -0.02em; color: #3a6b4a; margin: 0 0 6px; }
    .cal-subtitle { font-size: 11px; color: #7aaa88; letter-spacing: 0.14em; text-transform: uppercase; margin: 0; }
  </style>
  <style>
    :root { --door-colors: none; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Museo Sans', sans-serif; font-weight: 100; background: #f2f2f9; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 4rem; }
    .cal-root { width: 100%; max-width: 720px; }
    .cal-header { text-align: center; margin-bottom: 2.5rem; }
    .cal-title { font-family: 'Museo Sans', sans-serif; font-size: clamp(26px, 5vw, 38px); font-weight: 500; letter-spacing: -0.02em; color: #5a8a6a; margin-bottom: 6px; }
    .cal-subtitle { font-size: 12px; color: #6aab82; letter-spacing: 0.12em; text-transform: uppercase; }
    .cal-footer { text-align: center; margin-top: 20px; color: #2a4030; }
    .cal-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    @media (max-width: 500px) { .cal-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; } }

    .door { aspect-ratio: 1; position: relative; cursor: pointer; border-radius: 10px; overflow: hidden; }
    .door.locked { cursor: not-allowed; }
    .door-scene { position: absolute; inset: 0; border-radius: 10px; overflow: hidden; }
    .door-back { position: absolute; inset: 0; background: #111d16; border: 0.5px solid #2a4030; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px; text-align: center; z-index: 1; }
    .door-content-day { font-size: 9px; letter-spacing: 0.07em; color: #5a8a6a; margin-bottom: 4px; text-transform: uppercase; }
    .door-content-text { font-size: 10px; color: #8ac8a0; line-height: 1.35; }
    .door-left, .door-right { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 2; display: flex; align-items: center; justify-content: center; border: 0.5px solid rgba(0,0,0,0.12); transition: transform 0.65s cubic-bezier(0.4,0,0.2,1); backface-visibility: hidden; overflow: hidden; }
    .door-left  { left: 0;  border-radius: 10px 0 0 10px; transform-origin: left center; }
    .door-right { right: 0; border-radius: 0 10px 10px 0; transform-origin: right center; }
    .door.open .door-left  { transform: perspective(500px) rotateY(-115deg); }
    .door.open .door-right { transform: perspective(500px) rotateY(115deg); }
    .door.locked .door-left, .door.locked .door-right { opacity: 0.45; }
    .door-num-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .door-num { font-family: 'Museo Sans', sans-serif; font-size: clamp(20px, 3.5vw, 30px); font-weight: 300; line-height: 1; white-space: nowrap; position: absolute; }
    .divider { position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: rgba(0,0,0,0.15); z-index: 3; pointer-events: none; transition: opacity 0.4s; }
    .door.open .divider { opacity: 0; }

    /* ── Modal ── */
    .modal-text a { color: #a8d5b5; text-decoration: underline; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.visible { display: flex; }
    .modal { background: #111d16; border: 0.5px solid #2a4030; border-radius: 16px; padding: 2rem; max-width: 400px; width: 92%; position: relative; animation: modal-in .32s cubic-bezier(0.34,1.56,0.64,1); max-height: 90vh; overflow-y: auto; }
    @keyframes modal-in { from{opacity:0;transform:scale(0.85) translateY(14px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-day { font-size: 12px; font-weight: 300; letter-spacing: .12em; text-transform: uppercase; color: #5a8a6a; margin-bottom: .4rem; }
    .modal-title { font-family: 'Museo Sans', sans-serif; font-size: 24px; font-weight: 300; margin: 0 0 1rem; color: #e8f5ee; line-height: 1.2; }
    .modal-media { width: 100%; border-radius: 8px; margin-bottom: 1rem; display: block; }
    .modal-video { width: 100%; border-radius: 8px; margin-bottom: 1rem; display: block; background: #000; }
    .modal-text { font-size: 14px; line-height: 1.8; color: #8ac8a0; margin-bottom: 1.5rem; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; width: 30px; height: 30px; border: 0.5px solid #2a4030; border-radius: 50%; background: #1a2e20; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #6aab82; line-height: 1; }
    .modal-close:hover { background: #223828; }

    /* ── Registreringsskjema i modal ── */
    .register-section { border-top: 0.5px solid #2a4030; padding-top: 1.25rem; margin-top: 0.5rem; }
    .register-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #5a8a6a; margin-bottom: 0.75rem; display: block; }
    .register-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .register-input {
      background: #1a2e20; border: 0.5px solid #2a4030; border-radius: 8px;
      padding: 10px 14px; font-family: 'Museo Sans', sans-serif; font-weight: 300;
      font-size: 13px; color: #e8f5ee; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    .register-input::placeholder { color: #3a6040; }
    .register-input:focus { border-color: #5a8a6a; }
    .register-btn {
      width: 100%; padding: 10px; background: #2a5a38; border: none;
      border-radius: 8px; color: #a8d5b5; font-family: 'Museo Sans', sans-serif;
      font-weight: 500; font-size: 13px; cursor: pointer; letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .register-btn:hover { background: #336944; }
    .register-btn:disabled { background: #1a3020; color: #3a6040; cursor: not-allowed; }
    .register-status { font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }
    .register-status.ok  { color: #a8d5b5; }
    .register-status.err { color: #f0b8cc; }
    .register-confirmed { display: flex; align-items: center; gap: 8px; color: #a8d5b5; font-size: 13px; padding: 10px 0; }
    .register-confirmed svg { flex-shrink: 0; }

      17: { title: "Luke 17", text: "Fyll inn innhold her.", img: null, video: null },
      18: { title: "Luke 18", text: "Fyll inn innhold her.", img: null, video: null },
      19: { title: "Luke 19", text: "Fyll inn innhold her.", img: null, video: null },
      20: { title: "Luke 20", text: "Fyll inn innhold her.", img: null, video: null },
      21: { title: "Luke 21", text: "Fyll inn innhold her.", img: null, video: null },
      22: { title: "Luke 22", text: "Fyll inn innhold her.", img: null, video: null },
      23: { title: "Luke 23", text: "Fyll inn innhold her.", img: null, video: null },
      24: { title: "God jul!", text: "Gledesriktig jul til deg og dine. 🎄", img: null, video: null },
    };


    /* ============================================================
       KALENDER-LOGIKK
    ============================================================ */
    const grid    = document.getElementById('grid');
    const overlay = document.getElementById('overlay');

    for (let d = 1; d <= 24; d++) {
      const [bg, textCol] = DOOR_COLORS[(d - 1) % DOOR_COLORS.length];
      const isSingle = d < 10;
      const label    = String(d);

      const door  = document.createElement('div');
      const state = d < TODAY ? ' open' : d === TODAY ? ' today' : ' locked';
      door.className = 'door' + state;

      const scene = document.createElement('div');
      scene.className = 'door-scene';

      const back = document.createElement('div');
      back.className = 'door-back';
      if (d <= TODAY) {
        const c = CONTENT[d];
        back.innerHTML = `<p class="door-content-day">Des ${d}</p><p class="door-content-text">${c ? c.title : '...'}</p>`;
      }

      const divider = document.createElement('div');
      divider.className = 'divider';

      const leftHalf  = document.createElement('div');
      leftHalf.className  = 'door-left';
      leftHalf.style.background  = bg;

      const rightHalf = document.createElement('div');
      rightHalf.className = 'door-right';
      rightHalf.style.background = bg;

      if (isSingle) {
        const makeWrap = (side) => {
          const w = document.createElement('div');
          w.className = 'door-num-wrap';
          const n = document.createElement('div');
          n.className = 'door-num';
          n.style.color = textCol;
          n.textContent = label;
          if (side === 'left')  { n.style.right = '0'; n.style.transform = 'translateX(50%)'; }
          else                  { n.style.left  = '0'; n.style.transform = 'translateX(-50%)'; }
          w.appendChild(n);
          return w;
        };
        leftHalf.appendChild(makeWrap('left'));
        rightHalf.appendChild(makeWrap('right'));
      } else {
        const makeDigit = (ch, side) => {
          const w = document.createElement('div');
          w.className = 'door-num-wrap';
          const n = document.createElement('div');
          n.className = 'door-num';
          n.style.color = textCol;
          n.textContent = ch;
          n.style[side === 'left' ? 'right' : 'left'] = '4px';
          w.appendChild(n);
          return w;
        };
        leftHalf.appendChild(makeDigit(label[0], 'left'));
        rightHalf.appendChild(makeDigit(label[1], 'right'));
      }

      scene.appendChild(back);
      scene.appendChild(leftHalf);
      scene.appendChild(rightHalf);
      scene.appendChild(divider);
      door.appendChild(scene);

      if (d <= TODAY) {
        door.addEventListener('click', () => openDoor(d, door));
      }

      grid.appendChild(door);
    }

    // Holder styr på hvilken luke som er åpen i modalen
    let currentDoor = null;

    function openDoor(d, doorEl) {
      currentDoor = d;
      const c = CONTENT[d] || { title: `Luke ${d}`, text: 'Innhold kommer snart.', img: null, video: null };

      document.getElementById('modal-day').textContent   = `${d}. desember`;
      document.getElementById('modal-title').textContent = c.title;

      if (c.html) {
        document.getElementById('modal-text').innerHTML = c.html;
      } else {
        document.getElementById('modal-text').textContent = c.text || '';
      }

      const img = document.getElementById('modal-img');
      if (c.img) { img.src = c.img; img.style.display = 'block'; }
      else       { img.style.display = 'none'; }

      const video = document.getElementById('modal-video');
      const vs    = document.getElementById('modal-video-src');
      if (c.video) { vs.src = c.video; video.load(); video.style.display = 'block'; }
      else         { video.style.display = 'none'; video.pause(); }

      // Vis registreringsseksjon KUN for dagens luke
      const regSection = document.getElementById('register-section');
      if (d === TODAY) {
        regSection.style.display = 'block';
        resetRegisterForm(d);
      } else {
        regSection.style.display = 'none';
      }

      overlay.classList.add('visible');
      doorEl.classList.add('open');
    }

    /* ── Registreringslogikk ── */

    function resetRegisterForm(d) {
      // Sjekk om brukeren allerede har registrert seg for denne luken (localStorage)
      const key = `advent_registered_${d}`;
      if (localStorage.getItem(key)) {
        showConfirmed();
      } else {
        document.getElementById('register-form').style.display = 'block';
        document.getElementById('register-done').style.display = 'none';
        document.getElementById('reg-name').value  = '';
        document.getElementById('reg-email').value = '';
        document.getElementById('reg-status').textContent = '';
        document.getElementById('reg-btn').disabled = false;
      }
    }

    function showConfirmed() {
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('register-done').style.display = 'block';
    }

    document.getElementById('reg-btn').addEventListener('click', async () => {
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const status = document.getElementById('reg-status');

      if (!name)  { status.textContent = 'Vennligst fyll inn navn.'; status.className = 'register-status err'; return; }
      if (!email || !email.includes('@')) { status.textContent = 'Vennligst fyll inn en gyldig e-post.'; status.className = 'register-status err'; return; }

      const btn = document.getElementById('reg-btn');
      btn.disabled = true;
      status.textContent = 'Registrerer…';
      status.className = 'register-status';

      try {
        
          console.log("SUPABASE_URL:", SUPABASE_URL);
          console.log("ANON length:", SUPABASE_ANON_KEY?.length);
          console.log("ANON prefix:", SUPABASE_ANON_KEY?.slice(0, 25));
          console.log("Payload:", { door: currentDoor, name, email });

          const res = await fetch(`${SUPABASE_URL}/rest/v1/readings`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
              'apikey': KEY,
              'Authorization': `Bearer ${KEY}`,
              'Prefer': 'resolution=ignore-duplicates,return=minimal'
            },
            body: JSON.stringify({ door: currentDoor, name, email })
          });

          if (!res.ok) {
            const text = await res.text();
            throw new Error(`HTTP ${res.status}: ${text}`);
          }

          else {
          const err = await res.json();
          throw new Error(err.message || res.status);
        }
      } catch (e) {
        status.textContent = 'Noe gikk galt. Prøv igjen.';
        status.className = 'register-status err';
        btn.disabled = false;
        console.error(e);
      }
    });

    /* ── Lukk modal ── */
    function closeModal() {
      overlay.classList.remove('visible');
      document.getElementById('modal-video').pause();
      currentDoor = null;
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  </script>
</body>
</html>
